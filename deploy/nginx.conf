server {
    listen 80;
    server_name _;
    client_max_body_size 12m;  # allow menu/logo image uploads

    # Django static (admin) and uploaded media, served from shared volumes.
    location /static/ {
        alias /usr/share/nginx/static/;
        access_log off;
        expires 7d;
    }
    location /media/ {
        alias /usr/share/nginx/media/;
        access_log off;
        expires 7d;
    }

    # REST API and Django admin.
    location ~ ^/(api|admin)/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # WebSocket endpoint for live order events.
    location /ws/ {
        proxy_pass http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 3600s;
    }

    # Single-page app — everything else falls back to index.html.
    location / {
        root /usr/share/nginx/html;
        try_files $uri $uri/ /index.html;
    }
}
